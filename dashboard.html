<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — TrueStroke</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --forest-green: #1a3c34; --light-green: #2d5a4e; --gold: #c5a059; --bg-white: #fdfdfd; --text-dark: #1a1a1a; --text-gray: #666666; --border-light: #eee; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-white); color: var(--text-dark); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; border-bottom: 1px solid var(--border-light); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600; color: var(--forest-green); text-decoration: none; }
        .container { max-width: 700px; margin: 80px auto; padding: 0 20px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--forest-green); margin-bottom: 10px; }
        .subtext { color: var(--text-gray); margin-bottom: 50px; }
        .upload-box { border: 2px dashed var(--gold); border-radius: 8px; padding: 60px 20px; background-color: #fff; cursor: pointer; transition: background-color 0.3s; }
        .upload-box:hover { background-color: #faf8f3; }
        .upload-icon { font-size: 3rem; margin-bottom: 15px; }
        .upload-text { color: var(--text-gray); font-size: 1.1rem; }
        .upload-btn { background-color: var(--forest-green); color: #fff; padding: 14px 40px; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; margin-top: 40px; cursor: pointer; transition: background-color 0.3s; }
        .upload-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 30px; font-size: 1.1rem; color: var(--forest-green); font-weight: 600; min-height: 1.4em; }
        .angle-section { margin-top: 40px; }
        .angle-label { font-size: 0.85rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
        .angle-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .angle-card { flex: 1; min-width: 140px; max-width: 220px; border: 1px solid #ddd; border-radius: 8px; padding: 18px 14px; cursor: pointer; background: #fff; transition: border-color 0.2s, background-color 0.2s; }
        .angle-card .icon { font-size: 1.6rem; margin-bottom: 8px; }
        .angle-card .name { font-weight: 600; color: var(--text-dark); font-size: 0.95rem; }
        .angle-card .desc { font-size: 0.8rem; color: var(--text-gray); margin-top: 4px; }
        .angle-card.selected { border-color: var(--gold); background: #faf8f3; box-shadow: 0 0 0 1px var(--gold); }
        #configError { display: none; margin: 0 auto 30px; max-width: 640px; background: #fff7e6; border: 1px solid var(--gold); color: #6b5320; border-radius: 8px; padding: 16px 20px; text-align: left; font-size: 0.95rem; }
        #configError code { background: #f0ead9; padding: 1px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">TrueStroke</a>
        <div>
            <a href="history.html" style="text-decoration:none;color:var(--text-dark);font-size:0.9rem;">My Swings</a>
            <a href="#" id="signOut" style="text-decoration:none;color:var(--text-gray);font-size:0.9rem;margin-left:22px;">Sign Out</a>
        </div>
    </nav>
    <div class="container">
        <h1>Upload Your Swing</h1>
        <p class="subtext">Upload a 3–5 second video of your golf swing. Film side-on (down-the-line) with your full body in frame.</p>
        <div id="configError"></div>
        <div class="upload-box" id="dropzone">
            <input type="file" id="fileInput" accept="video/*" style="display: none;">
            <div class="upload-icon">🏌️‍♂️</div>
            <div class="upload-text" id="dropzoneText">Click to select a video</div>
        </div>
        <div class="angle-section">
            <div class="angle-label">How was it filmed?</div>
            <div class="angle-row">
                <div class="angle-card" id="angleFace" data-angle="face-on">
                    <div class="icon">🙂</div>
                    <div class="name">Facing me</div>
                    <div class="desc">Camera looks at your chest</div>
                </div>
                <div class="angle-card" id="angleDtl" data-angle="dtl">
                    <div class="icon">➡️</div>
                    <div class="name">Down my side</div>
                    <div class="desc">Camera behind hands, aimed at target</div>
                </div>
            </div>
        </div>
        <button class="upload-btn" id="analyzeBtn" disabled>Analyze My Swing</button>
        <div id="status"></div>
    </div>

    <script>
        // ============================================================
        // STEP 1 — PASTE YOUR SUPABASE CREDENTIALS HERE
        // These MUST be hardcoded. Static files on Vercel cannot read
        // environment variables (there's no build step to inject them).
        // The anon / publishable key is meant to live in client code —
        // it is protected by your Row Level Security policies.
        // Find both under: Supabase → Project Settings → API
        // ============================================================
        const SUPABASE_URL = (window.TS_CONFIG || {}).SUPABASE_URL || "YOUR-PROJECT-REF";
        const SUPABASE_ANON_KEY = (window.TS_CONFIG || {}).SUPABASE_ANON_KEY || "YOUR_SUPABASE";
        let currentUser = null;
        // ============================================================

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');
        const dropzoneText = document.getElementById('dropzoneText');
        const configError = document.getElementById('configError');

        let selectedFile = null;
        let selectedAngle = null;
        let sbClient = null;

        document.querySelectorAll('.angle-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.angle-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedAngle = card.dataset.angle;
                updateButton();
            });
        });
        function updateButton() {
            analyzeBtn.disabled = !(selectedFile && selectedAngle && supabaseReady);
        }

        // Validate config BEFORE creating the client, so a missing key shows a
        // clear message instead of throwing and silently killing the whole page.
        function initSupabase() {
            if (SUPABASE_URL.includes("YOUR-PROJECT-REF") || SUPABASE_ANON_KEY.includes("YOUR_SUPABASE")) {
                configError.style.display = "block";
                configError.innerHTML =
                    "<strong>Setup needed:</strong> paste your Supabase URL and anon key into <code>config.js</code>. " +
                    "Upload is disabled until then.";
                return false;
            }
            try {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                // Require a signed-in user; everything on this page is account-scoped.
                sbClient.auth.getSession().then(({ data }) => {
                    if (!data.session) { location.href = "login.html"; return; }
                    currentUser = data.session.user;
                });
                return true;
            } catch (err) {
                configError.style.display = "block";
                configError.textContent = "Couldn't connect to Supabase: " + err.message;
                return false;
            }
        }
        const supabaseReady = initSupabase();

        // Listeners attach regardless of config state, so the UI always responds.
        dropzone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (!e.target.files || e.target.files.length === 0) return;
            const file = e.target.files[0];

            if (!file.type.startsWith('video/')) {
                status.style.color = '#cc0000';
                status.textContent = 'Please select a video file.';
                return;
            }
            if (file.size > 50 * 1024 * 1024) {
                status.style.color = '#cc0000';
                status.textContent = 'That video is over 50 MB. Trim it to a 3–5s clip and try again.';
                return;
            }
            selectedFile = file;
            dropzoneText.textContent = `Selected: ${file.name}`;
            status.style.color = 'var(--forest-green)';
            status.textContent = '';
            updateButton();
            if (!supabaseReady) {
                status.style.color = '#cc0000';
                status.textContent = 'Finish Supabase setup above before uploading.';
            } else if (!selectedAngle) {
                status.textContent = 'Now pick how it was filmed.';
            }
        });

        document.getElementById('signOut').addEventListener('click', async (e) => {
            e.preventDefault();
            if (sbClient) await sbClient.auth.signOut();
            location.href = "login.html";
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile || !sbClient || !selectedAngle) return;
            analyzeBtn.disabled = true;
            status.style.color = 'var(--forest-green)';
            status.textContent = 'Uploading video…';

            // Keep the original extension so the <video> element knows the type.
            if (!currentUser) { location.href = "login.html"; return; }
            const safeName = selectedFile.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
            // Path MUST start with the user's id — the storage policies enforce it.
            const fileName = `${currentUser.id}/${Date.now()}_${safeName}`;

            try {
                const { error } = await sbClient.storage
                    .from('swing-videos')
                    .upload(fileName, selectedFile, {
                        cacheControl: '3600',
                        contentType: selectedFile.type || 'video/mp4',
                        upsert: false,
                    });
                if (error) throw error;

                status.textContent = 'Upload complete. Opening analysis…';
                // Bucket is private: pass the storage PATH; the analysis page downloads
                // it through the user's own authenticated session.
                window.location.href = `analysis.html?path=${encodeURIComponent(fileName)}&angle=${selectedAngle}`;
            } catch (err) {
                status.style.color = '#cc0000';
                status.textContent = `Upload failed: ${err.message}`;
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
